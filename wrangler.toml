name = "health-tracker"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "health-tracker-db"
database_id = "b208f864-8d87-41d1-a20a-b0ae611b0e33"
migrations_dir = "server/database/migrations"

[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "health-tracker-files"

# Secrets must NOT be stored here. Set them in Cloudflare Pages dashboard:
# Settings → Environment Variables → Add secret (encrypted).
# Use: JWT_SECRET, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_ID
[vars]
APP_ENV = "production"
